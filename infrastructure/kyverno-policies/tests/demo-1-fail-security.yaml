apiVersion: v1
kind: Pod
metadata:
  name: demo-1-fail-security
  namespace: kyverno-demo
spec:
  securityContext:
    runAsNonRoot: false
  containers:
    - name: firewall
      image: docker.io/d4vlin/firewall-service:v1.0.1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      securityContext:
        privileged: true
