apiVersion: v1
kind: Pod
metadata:
  name: demo-2-fail-latest
  namespace: kyverno-demo
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
    - name: firewall
      image: docker.io/d4vlin/firewall-service:latest
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      securityContext:
        runAsNonRoot: true
        privileged: false
