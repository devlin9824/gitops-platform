apiVersion: v1
kind: Pod
metadata:
  name: demo-4-pass-all
  namespace: kyverno-demo
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
    - name: firewall
      image: docker.io/d4vlin/firewall-service@sha256:debddbc3e529cfe6dc2b32724ddec33d3c838fae34cd2005b37901a31c2fbe1b
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      securityContext:
        runAsNonRoot: true
        privileged: false
